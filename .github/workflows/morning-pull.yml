name: Morning K-props pull

# 9am ET. Cron is always UTC; ET is UTC-4 during EDT (the whole paper-trading window,
# now through early August, is inside EDT -- no DST crossing to worry about this run).
# If this workflow is still running after the fall DST switch, bump to "0 14 * * *".
on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: morning-pull
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-actions.txt

      - name: Run daily_ks.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python src/daily_ks.py

      - name: Run daily_ml.py
        continue-on-error: true  # moneyline is paper/tracking only (already failed its
                                  # kill criteria, see CLAUDE.md) -- never let it block
                                  # committing daily_ks.py's real K-props flags
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python src/daily_ml.py

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $(ls data/raw/pitcher_gamelogs_*.csv data/raw/pitcher_handedness.csv \
                       data/raw/schedule_2026.csv \
                       output/ks_paper_ledger.csv output/odds_api_usage.csv \
                       output/ks_daily_scores.csv output/ks_daily_matched.csv \
                       output/ml_predictions_ledger.csv output/ml_market_comparison.csv 2>/dev/null)
          git diff --staged --quiet || git commit -m "Morning pull: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
