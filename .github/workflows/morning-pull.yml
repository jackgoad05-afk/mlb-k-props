name: Morning K-props pull

# 9am ET. Cron is always UTC; ET is UTC-4 during EDT (the whole paper-trading window,
# now through early August, is inside EDT -- no DST crossing to worry about this run).
# If this workflow is still running after the fall DST switch, bump to "0 14 * * *".
on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: morning-pull
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-actions.txt

      - name: Diagnostic - is ANTHROPIC_API_KEY reaching the job?
        # Prints ONLY the secret's length + presence, never its value. Decisive
        # check for why the research/article Claude pipelines produce no output:
        # if this warns "EMPTY/UNSET", the repo Actions secret isn't set / is
        # misnamed / is scoped to an Environment this job doesn't use. If it prints
        # a plausible length (~100+), the secret is fine and any failure is downstream.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::warning::ANTHROPIC_API_KEY is EMPTY or UNSET at the workflow level -- research + article pipelines will skip. Check repo Settings -> Secrets and variables -> Actions -> Repository secrets for a non-empty secret named exactly ANTHROPIC_API_KEY."
          else
            echo "ANTHROPIC_API_KEY is present (length ${#ANTHROPIC_API_KEY}). A real Anthropic key is ~100+ chars; a much shorter length suggests a truncated/placeholder value."
          fi

      - name: Diagnostic - Claude API + web search reachability (manual runs only)
        # Only on manual dispatch so scheduled runs don't pay for the 2 tiny probe
        # calls. Isolates whether the key/model work vs. whether the web_search tool
        # is the blocker -- see src/diagnose_claude.py. Never blocks the pull.
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/diagnose_claude.py

      - name: Run daily_ks.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python src/daily_ks.py

      - name: Run daily_ml.py
        continue-on-error: true  # moneyline is paper/tracking only (already failed its
                                  # kill criteria, see CLAUDE.md) -- never let it block
                                  # committing daily_ks.py's real K-props flags. Runs
                                  # BEFORE daily_article_picks so its ml_predictions_ledger
                                  # is available for the article-vs-model ML alignment.
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python src/daily_ml.py

      - name: Run daily_research_ks.py
        continue-on-error: true  # separate parallel experiment (Claude + web search
                                  # reviewing the same stats), never block committing
                                  # daily_ks.py's real stats-model flags. Reuses
                                  # daily_ks.py's already-fetched market data -- needs
                                  # NO Odds API key/quota of its own.
        timeout-minutes: 8  # now scoped to the top few games (same as article picks),
                             # so ~4 calls; writes incrementally as a backstop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUNBUFFERED: "1"  # stream [i/N] progress live instead of buffering to the end
        run: python src/daily_research_ks.py

      - name: Run daily_article_picks.py
        continue-on-error: true  # separate parallel experiment (pure article-based
                                  # picks, top 3-4 games only), never block committing
                                  # daily_ks.py's real stats-model flags
        timeout-minutes: 12  # up to 4 Claude+web-search calls; writes incrementally per game
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}  # needed for the moneyline h2h bulk pull
          PYTHONUNBUFFERED: "1"  # stream [i/N] progress live instead of buffering to the end
        run: python src/daily_article_picks.py

      - name: Run daily_pm.py
        continue-on-error: true  # same reasoning -- prediction-market comparison is a
                                  # separate paper experiment, never block the real
                                  # K-props/moneyline outputs from committing
        timeout-minutes: 10  # backstop: up to ~80 sequential per-row order-book calls
                              # to Polymarket/Kalshi, some of which are genuinely slow
                              # (see fetch_prediction_markets.py's _get timeout comment)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python src/daily_pm.py

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $(ls data/raw/pitcher_gamelogs_*.csv data/raw/pitcher_handedness.csv \
                       data/raw/schedule_2026.csv \
                       output/ks_paper_ledger.csv output/odds_api_usage.csv \
                       output/ks_daily_scores.csv output/ks_daily_matched.csv \
                       output/research_ks_daily.csv output/research_ks_ledger.csv \
                       output/article_picks_ks_ledger.csv output/article_picks_ml_ledger.csv \
                       output/ml_predictions_ledger.csv output/ml_market_comparison.csv \
                       output/pm_paper_ledger.csv output/pm_daily_matched.csv 2>/dev/null)
          git diff --staged --quiet || git commit -m "Morning pull: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
