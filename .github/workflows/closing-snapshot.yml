name: Closing-line snapshot

# 6pm ET = 22:00 UTC during EDT (see morning-pull.yml's note on the DST caveat).
# Idempotent: capture_closing_ks.py only queries games it hasn't already captured a
# closing price for, so it's safe to add more workflow_dispatch runs earlier in the
# day (e.g. ~1pm ET) for day-game coverage at no extra Odds API cost -- each flagged
# game still only gets queried once, just closer to its own first pitch.
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: closing-snapshot
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-actions.txt

      - name: Run capture_closing_ks.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python src/capture_closing_ks.py

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $(ls output/ks_paper_ledger.csv output/research_ks_ledger.csv output/odds_api_usage.csv 2>/dev/null)
          git diff --staged --quiet || git commit -m "Closing snapshot: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
