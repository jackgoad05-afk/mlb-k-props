name: Reconcile K-props ledger

# 3am ET = 07:00 UTC during EDT. Uses only the free MLB Stats API (actual strikeouts)
# plus closing prices already captured by closing-snapshot.yml -- no Odds API calls,
# no ODDS_API_KEY needed, zero quota cost.
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: reconcile
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-actions.txt

      - name: Run reconcile_ks.py
        run: python src/reconcile_ks.py reconcile

      - name: Print running summary (shows in the Actions log)
        run: python src/reconcile_ks.py summary --by-tier

      - name: Run reconcile_ml.py
        continue-on-error: true  # same reasoning as morning-pull.yml: don't let the
                                  # unrelated moneyline reconciliation block committing
                                  # reconcile_ks.py's real results
        run: python src/reconcile_ml.py reconcile

      - name: Print running summary (shows in the Actions log)
        continue-on-error: true
        run: python src/reconcile_ml.py summary --vs-market

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $(ls data/raw/pitcher_gamelogs_*.csv output/ks_paper_ledger.csv \
                       output/ml_predictions_ledger.csv 2>/dev/null)
          git diff --staged --quiet || git commit -m "Reconcile: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
